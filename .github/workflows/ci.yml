name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    env:
      DBTRAFFIC_TEST_CONNECTION_STRING: "Server=localhost,1433;Database=DbTraffic;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: YourStrong@Passw0rd
          MSSQL_PID: Developer
        ports:
          - 1433:1433
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install sqlcmd
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo '/opt/mssql-tools18/bin' >> $GITHUB_PATH

      - name: Wait for SQL Server
        run: |
          for i in {1..30}; do
            if sqlcmd -S localhost,1433 -U sa -P YourStrong@Passw0rd -Q "SELECT 1" > /dev/null 2>&1; then
              echo "SQL Server is ready"
              break
            fi
            echo "Waiting for SQL Server... attempt $i"
            sleep 2
          done

      - name: Create test database
        run: |
          sqlcmd -S localhost,1433 -U sa -P YourStrong@Passw0rd -d master -i database/schema.sql
          sqlcmd -S localhost,1433 -U sa -P YourStrong@Passw0rd -d master -i database/seed.sql

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          DBTRAFFIC_TEST_CONNECTION_STRING: ${{ env.DBTRAFFIC_TEST_CONNECTION_STRING }}

      - name: Check code formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true
